server:
  port: ${PORT:8084}

spring:
  application:
    name: data-service

  # Database Configuration with Environment Variable fallbacks
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/satdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:satpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONN_TIMEOUT:30000}

  # JPA & Hibernate Configurations
  jpa:
    hibernate:
      # Use strictly 'validate' since the schema is managed by init.sql
      ddl-auto: ${DDL_AUTO:validate}
    
    # Required for spatial queries and GEOMETRY types
    database-platform: ${DB_DIALECT:org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect}
    
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE:INFO}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_BINDER:WARN}
