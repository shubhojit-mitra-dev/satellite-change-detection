server:
  port: ${PORT:8081}

spring:
  application:
    name: ingestion-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/satdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:satpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONN_TIMEOUT:30000}

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    show-sql: ${SHOW_SQL:false}
  
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

kafka:
  topics:
    ingest: satellite.ingest

gee:
  script-path: ${GEE_SCRIPT_PATH:/home/blackknight05/Desktop/satellite-change-detection/classification-service/gee_fetch.py}
  python-path: ${PYTHON_VENV_PATH:/home/blackknight05/Desktop/satellite-change-detection/classification-service/.venv/bin/python}

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE:INFO}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_BINDER:WARN}
